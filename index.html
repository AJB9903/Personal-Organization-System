<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FIELDBOOK — Construction PM Action Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e0d0;
    --text2: #8a8070;
    --text3: #5a5048;
    --amber: #f59e0b;
    --amber2: #fbbf24;
    --amber-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --green: #22c55e;
    --blue: #3b82f6;
    --purple: #a855f7;
    --office: #f59e0b;
    --field: #22c55e;
    --engineer: #3b82f6;
    --architect: #a855f7;
    --personal: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* HEADER */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 0.12em;
    color: var(--amber);
    text-transform: uppercase;
  }
  .logo span { color: var(--text2); font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  /* BUTTONS */
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--amber); color: var(--amber); }
  .btn-primary {
    background: var(--amber);
    border-color: var(--amber);
    color: #000;
  }
  .btn-primary:hover { background: var(--amber2); border-color: var(--amber2); color: #000; }
  .btn-ghost { border-color: transparent; }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger { color: var(--red); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 56px); }
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .main { flex: 1; overflow-y: auto; padding: 24px; }

  /* SIDEBAR */
  .sidebar-section { margin-bottom: 8px; }
  .sidebar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 16px;
    margin-bottom: 4px;
  }
  .sidebar-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    border-left: 3px solid transparent;
    transition: all 0.1s;
  }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active {
    background: var(--amber-dim);
    color: var(--amber);
    border-left-color: var(--amber);
  }
  .sidebar-item .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: var(--bg3);
    padding: 2px 6px;
    border-radius: 2px;
    color: var(--text3);
  }
  .sidebar-item.active .count { background: var(--amber-dim); color: var(--amber); }
  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .job-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-right: 8px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 16px; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 20px;
    flex: 1; min-width: 120px;
  }
  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--amber);
    line-height: 1;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ACTION ITEMS */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.1s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .filter-pill:hover { border-color: var(--amber); color: var(--amber); }
  .filter-pill.active { background: var(--amber); border-color: var(--amber); color: #000; font-weight: 600; }

  .item-group { margin-bottom: 24px; }
  .item-group-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .item-group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .action-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 6px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s;
    position: relative;
  }
  .action-item:hover { border-color: var(--border2); background: var(--bg3); }
  .action-item.completed { opacity: 0.4; }
  .action-item.completed .item-text { text-decoration: line-through; color: var(--text3); }

  .checkbox-wrap {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 2px solid var(--border2);
    border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }
  .checkbox-wrap:hover { border-color: var(--amber); }
  .checkbox-wrap.checked { background: var(--amber); border-color: var(--amber); }
  .checkbox-wrap svg { display: none; }
  .checkbox-wrap.checked svg { display: block; }

  .item-content { flex: 1; min-width: 0; }
  .item-text { font-size: 14px; line-height: 1.4; color: var(--text); margin-bottom: 6px; }
  .item-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border: 1px solid;
  }
  .tag-office { color: var(--office); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
  .tag-field { color: var(--field); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); }
  .tag-engineer { color: var(--engineer); border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }
  .tag-architect { color: var(--architect); border-color: rgba(168,85,247,0.3); background: rgba(168,85,247,0.08); }
  .tag-personal { color: var(--personal); border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.08); }
  .tag-job {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 0.04em;
    border: 1px solid var(--border2);
    color: var(--text2);
  }
  .tag-owner {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
  }

  .item-actions {
    display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s;
  }
  .action-item:hover .item-actions { opacity: 1; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    width: 100%; max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    display: block;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    transition: border-color 0.15s;
    outline: none;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--amber);
  }
  .form-textarea { resize: vertical; min-height: 120px; }
  .form-select option { background: var(--bg3); }
  .form-row { display: flex; gap: 12px; }
  .form-row .form-group { flex: 1; }

  /* CATEGORY PICKER */
  .cat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .cat-btn {
    padding: 8px 4px;
    border: 1px solid var(--border2);
    border-radius: 3px;
    cursor: pointer;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text2);
    background: var(--bg3);
    transition: all 0.1s;
  }
  .cat-btn:hover { border-color: var(--text2); color: var(--text); }
  .cat-btn.active-office { border-color: var(--office); color: var(--office); background: rgba(245,158,11,0.1); }
  .cat-btn.active-field { border-color: var(--field); color: var(--field); background: rgba(34,197,94,0.1); }
  .cat-btn.active-engineer { border-color: var(--engineer); color: var(--engineer); background: rgba(59,130,246,0.1); }
  .cat-btn.active-architect { border-color: var(--architect); color: var(--architect); background: rgba(168,85,247,0.1); }
  .cat-btn.active-personal { border-color: var(--personal); color: var(--personal); background: rgba(249,115,22,0.1); }

  /* TABS */
  .tab-bar {
    display: flex; border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.1s;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border2);
    border-radius: 3px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text3);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--amber);
    background: var(--amber-dim);
    color: var(--amber);
  }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-text { font-size: 13px; }
  .upload-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; margin-top: 4px; color: var(--text3); }

  /* AI PROCESSING */
  .processing-bar {
    background: var(--bg3);
    border: 1px solid var(--amber-dim);
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--amber);
  }

  /* PREVIEW ITEMS */
  .preview-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    margin-bottom: 6px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .preview-item-text { flex: 1; font-size: 13px; line-height: 1.4; }
  .preview-controls { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* API KEY */
  .api-banner {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .api-banner-icon { font-size: 18px; }
  .api-banner-text { flex: 1; font-size: 13px; color: var(--text2); }

  /* TOAST */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 999;
  }
  .toast {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
    animation: slideIn 0.2s ease;
    min-width: 260px;
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--amber); }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; margin-bottom: 4px; }
  .empty-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }

  /* DAILY DIGEST */
  .digest-banner {
    background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, rgba(245,158,11,0.03) 100%);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 3px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .digest-left { display: flex; align-items: center; gap: 12px; }
  .digest-icon { font-size: 24px; }
  .digest-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber);
  }
  .digest-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* REMINDER MODAL */
  .reminder-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--amber);
    text-align: center;
    letter-spacing: 0.04em;
    padding: 20px 0;
  }

  /* COST ESTIMATE */
  .cost-panel {
    background: var(--bg3);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 3px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .cost-panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .cost-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .cost-cell { text-align: center; }
  .cost-cell-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 3px;
  }
  .cost-cell-val.highlight { color: var(--amber); font-size: 22px; }
  .cost-cell-lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .cost-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .cost-disclaimer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .cost-actions { display: flex; gap: 8px; }

  .no-print { }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .stats-bar { gap: 8px; }
    .stat-card { padding: 10px 14px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CATEGORIES = {
  office:    { label: 'Office',    color: '#f59e0b', tag: 'tag-office' },
  field:     { label: 'Field',     color: '#22c55e', tag: 'tag-field' },
  engineer:  { label: 'Engineer',  color: '#3b82f6', tag: 'tag-engineer' },
  architect: { label: 'Architect', color: '#a855f7', tag: 'tag-architect' },
  personal:  { label: 'Personal',  color: '#f97316', tag: 'tag-personal' },
};

const JOB_COLORS = ['#f59e0b','#22c55e','#3b82f6','#a855f7','#f97316','#ec4899','#14b8a6','#6366f1'];

function uid() { return Math.random().toString(36).slice(2, 10); }

function getToday() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function useLocalStorage(key, def) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

// ─── Toast ───────────────────────────────────────────────────────────────────
function Toasts({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : '◆'}</span>
          {t.message}
        </div>
      ))}
    </div>
  );
}

// ─── Checkbox ─────────────────────────────────────────────────────────────────
function Checkbox({ checked, onChange }) {
  return (
    <div className={`checkbox-wrap ${checked ? 'checked' : ''}`} onClick={onChange}>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <polyline points="2,6 5,9 10,3" stroke="#000" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

// ─── Tag ──────────────────────────────────────────────────────────────────────
function CatTag({ cat }) {
  if (!cat || !CATEGORIES[cat]) return null;
  return <span className={`tag ${CATEGORIES[cat].tag}`}>{CATEGORIES[cat].label}</span>;
}

// ─── Category Picker ─────────────────────────────────────────────────────────
function CatPicker({ value, onChange }) {

// ─── Cost Estimation ─────────────────────────────────────────────────────────
// Pricing: claude-sonnet-4-20250514
// Input:  $3.00 / 1M tokens
// Output: $15.00 / 1M tokens
const INPUT_COST_PER_TOKEN  = 3.00  / 1_000_000;
const OUTPUT_COST_PER_TOKEN = 15.00 / 1_000_000;
const EST_OUTPUT_TOKENS = 500; // conservative output estimate

function estimateTextTokens(str) {
  // ~4 chars per token is the standard rough estimate
  return Math.ceil((str || '').length / 4);
}

function estimateImageTokens(base64str) {
  // Anthropic charges by pixel count. We don't know dimensions from base64 alone,
  // so estimate from byte size: base64 → raw bytes → approximate pixel count.
  // A typical 1MP image ≈ 1500 tokens; scale linearly.
  const rawBytes = Math.ceil((base64str || '').length * 0.75);
  const estimatedMegapixels = rawBytes / 1_000_000;
  return Math.max(800, Math.min(4000, Math.round(estimatedMegapixels * 1200 + 800)));
}

function buildEstimate(inputTokens) {
  const outputTokens = EST_OUTPUT_TOKENS;
  const inputCost    = inputTokens  * INPUT_COST_PER_TOKEN;
  const outputCost   = outputTokens * OUTPUT_COST_PER_TOKEN;
  const totalCost    = inputCost + outputCost;
  return { inputTokens, outputTokens, inputCost, outputCost, totalCost };
}

function fmt(n) {
  if (n < 0.001) return '<$0.001';
  return '$' + n.toFixed(4);
}

      <div className="cost-breakdown" style={{display:'flex',gap:24,marginBottom:10}}>

// ─── Brain Dump Modal ─────────────────────────────────────────────────────────
function BrainDumpModal({ jobs, apiKey, onAdd, onClose, addToast }) {
  const [tab, setTab] = useState('text');
  const [text, setText] = useState('');
  const [file, setFile] = useState(null);
  const [fileContent, setFileContent] = useState('');
  const [imageData, setImageData] = useState(null);
  const [imageMediaType, setImageMediaType] = useState('image/jpeg');
  const [processing, setProcessing] = useState(false);
  const [preview, setPreview] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [estimate, setEstimate] = useState(null); // cost estimate pending confirmation
  const [pendingAction, setPendingAction] = useState(null); // fn to run after confirm
  const fileRef = useRef();

  const SYSTEM_PROMPT_TOKENS = 300; // fixed overhead for system prompt
  const jobContext = jobs.map(j => `${j.code}: ${j.name}`).join(', ') || 'No jobs set up yet';

  async function callClaude(messages, dumpText) {
    // Build a single clean user message that has the instructions + the raw dump
    const today = new Date().toISOString().slice(0, 10);
    const jobList = jobContext || 'none';

    const instructionPrefix = `Convert every line of this brain dump into a JSON action item. Return ONLY a JSON array, no other text.

Rules:
1. Every line becomes at least one item — nothing is skipped.
2. Fix typos: tmr=tomorrow, monay=Monday, ned=need, gt=got, si=is, fgo=go, gewnerate=generate, fr=for, tmorror=tomorrow, precon wal=precon walk, fa=fire alarm, pco=PCO, oac=OAC, edj=EDJ, hdr=HDR, ici=ICI, sdj=SDJ, ab=about, cheklist=checklist, brandw all=brand wall, fur out=furr out.
3. Write each item as an imperative: "Send PCO to Ryan", "Schedule weekly subcontractor meeting".
4. Status/completed lines become logs: "Log: Ceiling and wall close-in inspections completed".
5. category must be exactly one of: office, field, engineer, architect, personal, or empty string.
   office = admin/emails/reports/scheduling/submittals/contracts
   field = site work/inspections/physical tasks/material/installs
   engineer = engineering items
   architect = drawings/specs/architecture
   personal = personal errands
6. Known jobs: ${jobList}. Match jobCode by name similarity (hdr=HDR, edward jones=EDJ, edj=EDJ, ici=ICI, sdj=SDJ, counter culture=that job). Leave empty if no match.
7. owner = initials of person named as responsible. TJ=TJ, Ryan=RY, Chuck=CH, Jeff=JF, Cameron=CM. Empty if none.
8. dueDate = ${today} if time is implied (tomorrow/today/morning/Monday/by Xam). Empty otherwise.
9. Output format per item: {"text":"...","category":"...","jobCode":"...","owner":"...","dueDate":"..."}

Brain dump to process:
`;

    // Replace the user message content with instruction + dump prepended
    const enrichedMessages = messages.map((m, i) => {
      if (i === 0 && m.role === 'user') {
        if (typeof m.content === 'string') {
          return { ...m, content: instructionPrefix + m.content };
        }
        // vision message — prepend instruction as first text block
        const blocks = Array.isArray(m.content) ? m.content : [m.content];
        return { ...m, content: [{ type: 'text', text: instructionPrefix }, ...blocks] };
      }
      return m;
    });

    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: 'You are a JSON API for a construction project management app. You ONLY output raw JSON arrays. Never output markdown, explanations, or any text outside the JSON array brackets.',
      messages: enrichedMessages
    };

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (data.error) throw new Error('API error: ' + data.error.message);

    const raw = (data.content || []).map(b => b.text || '').join('').trim();
    console.log('[FIELDBOOK] Raw API response:', raw.slice(0, 500));

    // Try direct parse first
    try { return JSON.parse(raw); } catch(_) {}

    // Strip any markdown fences
    const stripped = raw.replace(/^```(?:json)?\n?|\n?```$/g, '').trim();
    try { return JSON.parse(stripped); } catch(_) {}

    // Extract first [...] block
    const match = stripped.match(/\[([\s\S]*)\]/);
    if (match) {
      try { return JSON.parse('[' + match[1] + ']'); } catch(_) {}
      try { return JSON.parse(match[0]); } catch(_) {}
    }

    // Nothing worked — throw with raw preview for debugging
    throw new Error('Could not parse AI response. Open browser console for details. Preview: ' + raw.slice(0, 120));
  }

  // ── Request estimate → show confirm → then run
  function requestProcess(type) {
    if (!apiKey) { addToast('API key required — set it in Settings', 'error'); return; }

    let inputTokens = SYSTEM_PROMPT_TOKENS;
    if (type === 'text') {
      inputTokens += estimateTextTokens(`Extract action items from this brain dump:\n\n${text}`);
    } else if (type === 'image') {
      inputTokens += estimateImageTokens(imageData) + estimateTextTokens('Read all handwritten and printed text in this image, then extract all action items as JSON.');
    } else if (type === 'file') {
      inputTokens += estimateTextTokens(`Extract action items from this file:\n\n${fileContent}`);
    }

    setEstimate(buildEstimate(inputTokens));
    setPendingAction(() => () => runProcess(type));
  }

  function confirmAndRun() {
    setEstimate(null);
    if (pendingAction) pendingAction();
    setPendingAction(null);
  }

  function cancelEstimate() {
    setEstimate(null);
    setPendingAction(null);
  }

  async function runProcess(type) {
    setProcessing(true);
    try {
      let items;
      if (type === 'text') {
        items = await callClaude([{ role: 'user', content: text }]);
      } else if (type === 'image') {
        items = await callClaude([{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMediaType, data: imageData } },
            { type: 'text', text: 'Handwritten notebook image. Read every word.' }
          ]
        }]);
      } else if (type === 'file') {
        items = await callClaude([{ role: 'user', content: fileContent }]);
      }
      setPreview((items || []).map(i => ({ ...i, id: uid(), keep: true })));
    } catch (e) {
      addToast('AI error: ' + e.message, 'error');
    }
    setProcessing(false);
  }

  function handleImageFile(f) {
    if (!f || !f.type.startsWith('image/')) { addToast('Please upload an image file', 'error'); return; }
    setImageMediaType(f.type === 'image/png' ? 'image/png' : f.type === 'image/gif' ? 'image/gif' : f.type === 'image/webp' ? 'image/webp' : 'image/jpeg');
    const reader = new FileReader();
    reader.onload = e => setImageData(e.target.result.split(',')[1]);
    reader.readAsDataURL(f);
  }

  async function handleTextFile(f) {
    if (!f) return;
    const content = await f.text();
    setFile(f);
    setFileContent(content);
  }

  function addAll() {
    const toAdd = preview.filter(p => p.keep);
    toAdd.forEach(p => {
      const job = jobs.find(j => j.code === p.jobCode);
      onAdd({ text: p.text, category: p.category || '', jobId: job?.id || '', owner: p.owner || '', dueDate: p.dueDate || '' });
    });
    addToast(`${toAdd.length} items added`, 'success');
    onClose();
  }

  function updatePreviewItem(id, field, val) {
    setPreview(prev => prev.map(p => p.id === id ? { ...p, [field]: val } : p));
  }

  function resetTab(t) { setTab(t); setPreview([]); setEstimate(null); setPendingAction(null); }

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth: 700}}>
        <div className="modal-header">
          <div className="modal-title">Brain Dump</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div style={{borderBottom:'1px solid var(--border)'}}>
          <div className="tab-bar" style={{padding:'0 24px', marginBottom:0}}>
            {[['text','Text / Paste'],['image','Photo / Scan'],['file','File Upload']].map(([k,l]) => (
              <div key={k} className={`tab ${tab===k?'active':''}`} onClick={() => resetTab(k)}>{l}</div>
            ))}
          </div>
        </div>

        <div className="modal-body">
          {tab === 'text' && !estimate && (
            <>
              <div className="form-group">
                <label className="form-label">Paste notes, meeting minutes, or any text</label>
                <textarea className="form-textarea" value={text} onChange={e => setText(e.target.value)}
                  placeholder="Dump everything here — calls, notes, site observations, meeting notes. AI will extract the action items." style={{minHeight:140}} />
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <button className="btn btn-primary" onClick={() => requestProcess('text')} disabled={processing || !text.trim()}>
                  {processing ? '⟳ Processing...' : '◆ Extract Action Items'}
                </button>
                {text.trim() && (
                  <span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'var(--text3)'}}>
                    ~{(SYSTEM_PROMPT_TOKENS + estimateTextTokens(text)).toLocaleString()} est. input tokens
                  </span>
                )}
              </div>
            </>
          )}

          {tab === 'image' && !estimate && (
            <>
              {!imageData ? (
                <div
                  className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
                  onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={e => { e.preventDefault(); setDragOver(false); handleImageFile(e.dataTransfer.files[0]); }}
                  onClick={() => fileRef.current?.click()}
                >
                  <div className="upload-icon">📷</div>
                  <div className="upload-text">Drop notebook photo or tap to select</div>
                  <div className="upload-sub">JPG / PNG / WEBP — handwriting or printed notes</div>
                  <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
                    onChange={e => handleImageFile(e.target.files[0])} />
                </div>
              ) : (
                <>
                  <img src={`data:${imageMediaType};base64,${imageData}`}
                    style={{width:'100%',maxHeight:200,objectFit:'contain',borderRadius:3,border:'1px solid var(--border)',marginBottom:12}} alt="Notebook" />
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <button className="btn btn-primary" onClick={() => requestProcess('image')} disabled={processing}>
                      {processing ? '⟳ Processing...' : '◆ Read & Extract'}
                    </button>
                    <button className="btn" onClick={() => { setImageData(null); setPreview([]); }}>Remove</button>
                    <span style={{marginLeft:'auto',fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'var(--text3)'}}>
                      ~{(SYSTEM_PROMPT_TOKENS + estimateImageTokens(imageData)).toLocaleString()} est. input tokens
                    </span>
                  </div>
                </>
              )}
            </>
          )}

          {tab === 'file' && !estimate && (
            <>
              {!file ? (
                <div className="upload-zone" onClick={() => fileRef.current?.click()}>
                  <div className="upload-icon">📄</div>
                  <div className="upload-text">Upload a text file</div>
                  <div className="upload-sub">TXT / MD / CSV</div>
                  <input ref={fileRef} type="file" accept=".txt,.md,.csv,.text" style={{display:'none'}}
                    onChange={e => handleTextFile(e.target.files[0])} />
                </div>
              ) : (
                <>
                  <div className="processing-bar" style={{marginBottom:12}}>
                    <span style={{fontSize:18}}>📄</span>
                    <span className="processing-text" style={{color:'var(--text)'}}>{file.name}</span>
                    <span style={{marginLeft:'auto',fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'var(--text3)'}}>
                      ~{(SYSTEM_PROMPT_TOKENS + estimateTextTokens(fileContent)).toLocaleString()} tokens
                    </span>
                    <button className="btn btn-ghost btn-sm btn-danger" onClick={() => { setFile(null); setFileContent(''); setPreview([]); }}>Remove</button>
                  </div>
                  <button className="btn btn-primary" onClick={() => requestProcess('file')} disabled={processing}>
                    {processing ? '⟳ Processing...' : '◆ Extract Action Items'}
                  </button>
                </>
              )}
            </>
          )}

          {/* Cost Confirmation Panel */}
          {estimate && !processing && (
            <CostConfirmPanel estimate={estimate} onConfirm={confirmAndRun} onCancel={cancelEstimate} />
          )}

          {processing && (
            <div className="processing-bar" style={{marginTop:16}}>
              <div className="spinner"></div>
              <span className="processing-text">AI reading and extracting items...</span>
            </div>
          )}

          {preview.length > 0 && !estimate && (
            <>
              <hr className="divider" />
              <div style={{marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div className="form-label" style={{margin:0}}>Extracted Items — {preview.filter(p=>p.keep).length} selected</div>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-sm" onClick={() => setPreview(p => p.map(i => ({...i,keep:true})))}>All</button>
                  <button className="btn btn-sm" onClick={() => setPreview(p => p.map(i => ({...i,keep:false})))}>None</button>
                </div>
              </div>
              {preview.map(p => (
                <div key={p.id} className="preview-item" style={{opacity: p.keep ? 1 : 0.4}}>
                  <Checkbox checked={p.keep} onChange={() => updatePreviewItem(p.id,'keep',!p.keep)} />
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,marginBottom:8,lineHeight:1.4}}>{p.text}</div>
                    <div className="preview-controls">
                      <select className="form-select" style={{flex:1,fontSize:11,padding:'3px 8px'}}
                        value={p.jobCode}
                        onChange={e => updatePreviewItem(p.id,'jobCode',e.target.value)}>
                        <option value="">— General —</option>
                        {jobs.map(j => <option key={j.id} value={j.code}>{j.code} — {j.name}</option>)}
                      </select>
                      <select className="form-select" style={{fontSize:11,padding:'3px 8px',width:'auto'}}
                        value={p.category}
                        onChange={e => updatePreviewItem(p.id,'category',e.target.value)}>
                        <option value="">No Type</option>
                        {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>

        {preview.length > 0 && !estimate && (
          <div className="modal-footer">
            <button className="btn" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={addAll}>
              Add {preview.filter(p=>p.keep).length} Items to Action Book
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Job Manager Modal ────────────────────────────────────────────────────────
function JobModal({ jobs, onSave, onClose }) {

  const [code, setCode] = useState('');
  const [name, setName] = useState('');
  const [stage, setStage] = useState('active');

  function addJob() {
    if (!code.trim() || !name.trim()) return;
    const color = JOB_COLORS[list.length % JOB_COLORS.length];
    setList(prev => [...prev, { id: uid(), code: code.trim().toUpperCase(), name: name.trim(), stage, color }]);
    setCode(''); setName('');
  }
  function removeJob(id) { setList(prev => prev.filter(j => j.id !== id)); }

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Manage Jobs / Projects</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <div className="form-group" style={{maxWidth:100}}>
              <label className="form-label">Code</label>
              <input className="form-input" value={code} onChange={e=>setCode(e.target.value)}
                placeholder="OAK" maxLength={8} style={{textTransform:'uppercase'}} />
            </div>
            <div className="form-group">
              <label className="form-label">Project Name</label>
              <input className="form-input" value={name} onChange={e=>setName(e.target.value)}
                placeholder="Oakwood Renovation" />
            </div>
            <div className="form-group" style={{maxWidth:120}}>
              <label className="form-label">Stage</label>
              <select className="form-select" value={stage} onChange={e=>setStage(e.target.value)}>
                <option value="active">Active</option>
                <option value="precon">Precon</option>
                <option value="bid">Bid / Budget</option>
                <option value="closeout">Closeout</option>
                <option value="hold">On Hold</option>
              </select>
            </div>
          </div>
          <button className="btn btn-primary" onClick={addJob} disabled={!code.trim()||!name.trim()}>+ Add Job</button>

          <hr className="divider" />
          {list.length === 0 && <div className="empty-sub" style={{textAlign:'center',padding:'20px 0'}}>No jobs yet</div>}
          {list.map(j => (
            <div key={j.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,padding:'10px 12px',background:'var(--bg3)',borderRadius:3,border:'1px solid var(--border)'}}>
              <div className="job-dot" style={{background:j.color}}></div>
              <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,color:j.color,width:70,flexShrink:0}}>{j.code}</div>
              <div style={{flex:1,fontSize:13}}>{j.name}</div>
              <span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'var(--text3)',textTransform:'uppercase'}}>{j.stage}</span>
              <button className="btn btn-ghost btn-sm btn-danger" onClick={() => removeJob(j.id)}>✕</button>
            </div>
          ))}
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => { onSave(list); onClose(); }}>Save Jobs</button>
        </div>
      </div>
    </div>
  );
}

// ─── Settings Modal ───────────────────────────────────────────────────────────
function SettingsModal({ apiKey, reminderTime, onSave, onClose }) {
  const [key, setKey] = useState(apiKey);
  const [time, setTime] = useState(reminderTime);

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Settings</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">Anthropic API Key</label>
            <input className="form-input" type="password" value={key} onChange={e=>setKey(e.target.value)}
              placeholder="sk-ant-..." />
            <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'var(--text3)',marginTop:6}}>
              Stored locally in your browser only. Get one at console.anthropic.com
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Daily Reminder Time</label>
            <input className="form-input" type="time" value={time} onChange={e=>setTime(e.target.value)} />
            <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:10,color:'var(--text3)',marginTop:6}}>
              Browser notification of open items. Allow notifications when prompted.
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={() => { onSave({ apiKey: key, reminderTime: time }); onClose(); }}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems] = useLocalStorage('fb_items', []);
  const [jobs, setJobs] = useLocalStorage('fb_jobs', []);
  const [apiKey, setApiKey] = useLocalStorage('fb_apikey', '');
  const [reminderTime, setReminderTime] = useLocalStorage('fb_reminder', '07:30');
  const [toasts, setToasts] = useState([]);
  const [modal, setModal] = useState(null); // null | 'dump' | 'add' | 'edit' | 'jobs' | 'settings'
  const [editItem, setEditItem] = useState(null);
  const [activeJob, setActiveJob] = useState('all');
  const [activeCat, setActiveCat] = useState('all');
  const [showCompleted, setShowCompleted] = useState(false);

  // ── Toast
  function addToast(message, type = 'info') {
    const id = uid();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }

  // ── Daily Reminder
  useEffect(() => {
    if (!('Notification' in window)) return;
    let interval = setInterval(() => {
      const now = new Date();
      const [h, m] = reminderTime.split(':').map(Number);
      if (now.getHours() === h && now.getMinutes() === m) {
        const open = items.filter(i => !i.completed).length;
        if (open > 0 && Notification.permission === 'granted') {
          new Notification('FIELDBOOK — Daily Digest', {
            body: `You have ${open} open action items across ${jobs.length} jobs.`,
            icon: ''
          });
        } else if (Notification.permission !== 'denied') {
          Notification.requestPermission();
        }
      }
    }, 60000);
    return () => clearInterval(interval);
  }, [reminderTime, items, jobs]);

  function requestNotifications() {
    if ('Notification' in window) Notification.requestPermission().then(p => {
      addToast(p === 'granted' ? 'Notifications enabled' : 'Notifications denied', p === 'granted' ? 'success' : 'error');
    });
  }

  // ── CRUD
  function addItem(data) {
    setItems(prev => [{ id: uid(), completed: false, createdAt: new Date().toISOString(), ...data }, ...prev]);
  }
  function toggleItem(id) {
    setItems(prev => prev.map(i => i.id === id ? { ...i, completed: !i.completed } : i));
  }
  function deleteItem(id) {
    setItems(prev => prev.filter(i => i.id !== id));
    addToast('Item removed', 'info');
  }
  function saveEdit(data) {
    setItems(prev => prev.map(i => i.id === editItem.id ? { ...i, ...data } : i));
    setEditItem(null); setModal(null);
    addToast('Item updated', 'success');
  }

  // ── Filtered items
  const filtered = items.filter(i => {
    if (!showCompleted && i.completed) return false;
    if (activeJob !== 'all' && i.jobId !== activeJob) return false;
    if (activeCat !== 'all' && i.category !== activeCat) return false;
    return true;
  });

  // Group by job
  const grouped = {};
  filtered.forEach(i => {
    const key = i.jobId || '__general';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(i);
  });

  // Stats
  const openCount = items.filter(i => !i.completed).length;
  const doneCount = items.filter(i => i.completed).length;
  const overdue = items.filter(i => !i.completed && i.dueDate && new Date(i.dueDate) < new Date()).length;

  function getJobLabel(key) {
    if (key === '__general') return 'General / Unassigned';
    const j = jobs.find(j => j.id === key);
    return j ? `${j.code} — ${j.name}` : 'Unknown';
  }
  function getJobColor(key) {
    if (key === '__general') return '#5a5048';
    return jobs.find(j => j.id === key)?.color || '#5a5048';
  }

  return (
    <>
      {/* HEADER */}
      <div className="header">
        <div className="logo">Fieldbook <span>// PM Action Tracker</span></div>
        <div className="header-right">
          <button className="btn" onClick={() => setModal('jobs')}>⬡ Jobs</button>
          <button className="btn btn-primary" onClick={() => setModal('dump')}>⊕ Brain Dump</button>
          <button className="btn btn-ghost btn-sm" onClick={() => setModal('settings')} title="Settings">⚙</button>
        </div>
      </div>

      <div className="layout">
        {/* SIDEBAR */}
        <div className="sidebar">
          <div className="sidebar-section">
            <div className="sidebar-label">View</div>
            <div className={`sidebar-item ${activeJob==='all'&&activeCat==='all'?'active':''}`}
              onClick={() => { setActiveJob('all'); setActiveCat('all'); }}>
              All Items <span className="count">{openCount}</span>
            </div>
            {overdue > 0 && (
              <div className="sidebar-item" style={{color:'var(--red)'}} onClick={() => { setActiveJob('all'); setActiveCat('all'); }}>
                ⚠ Overdue <span className="count" style={{color:'var(--red)'}}>{overdue}</span>
              </div>
            )}
          </div>

          <hr className="sidebar-divider" />
          <div className="sidebar-section">
            <div className="sidebar-label">By Type</div>
            {Object.entries(CATEGORIES).map(([k, v]) => {
              const c = items.filter(i => !i.completed && i.category === k).length;
              return (
                <div key={k} className={`sidebar-item ${activeCat===k?'active':''}`}
                  onClick={() => { setActiveCat(k); setActiveJob('all'); }}
                  style={activeCat===k ? {} : {}}>
                  <span style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:8,height:8,borderRadius:'50%',background:v.color,flexShrink:0}}></span>
                    {v.label}
                  </span>
                  <span className="count">{c}</span>
                </div>
              );
            })}
          </div>

          <hr className="sidebar-divider" />
          <div className="sidebar-section">
            <div className="sidebar-label">Jobs</div>
            {jobs.length === 0 && (
              <div style={{padding:'8px 16px',fontSize:12,color:'var(--text3)'}}>No jobs — add via ⬡ Jobs</div>
            )}
            {jobs.map(j => {
              const c = items.filter(i => !i.completed && i.jobId === j.id).length;
              return (
                <div key={j.id} className={`sidebar-item ${activeJob===j.id?'active':''}`}
                  onClick={() => { setActiveJob(j.id); setActiveCat('all'); }}>
                  <span style={{display:'flex',alignItems:'center',gap:6,overflow:'hidden'}}>
                    <span className="job-dot" style={{background:j.color}}></span>
                    <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{j.code}</span>
                  </span>
                  <span className="count">{c}</span>
                </div>
              );
            })}
          </div>

          <div style={{marginTop:'auto', padding:'16px'}}>
            <button className="btn btn-sm" style={{width:'100%'}} onClick={() => { addItem({text:'', category:'', jobId:'', owner:'', dueDate:''}); setModal('add'); }}>
              + Manual Add
            </button>
          </div>
        </div>

        {/* MAIN */}
        <div className="main">
          {!apiKey && (
            <div className="api-banner">
              <div className="api-banner-icon">◆</div>
              <div className="api-banner-text">Set your Anthropic API key in Settings to enable AI brain dump processing.</div>
              <button className="btn btn-sm" onClick={() => setModal('settings')}>Set Key</button>
            </div>
          )}

          {/* Stats */}
          <div className="stats-bar">
            <div className="stat-card">
              <div className="stat-value">{openCount}</div>
              <div className="stat-label">Open Items</div>
            </div>
            <div className="stat-card">
              <div className="stat-value" style={{color:'var(--green)'}}>{doneCount}</div>
              <div className="stat-label">Completed</div>
            </div>
            <div className="stat-card">
              <div className="stat-value" style={{color:'var(--red)'}}>{overdue}</div>
              <div className="stat-label">Overdue</div>
            </div>
            <div className="stat-card">
              <div className="stat-value" style={{color:'var(--blue)'}}>{jobs.length}</div>
              <div className="stat-label">Active Jobs</div>
            </div>
          </div>

          {/* Digest Banner */}
          <div className="digest-banner">
            <div className="digest-left">
              <div className="digest-icon">◈</div>
              <div>
                <div className="digest-title">{getToday()}</div>
                <div className="digest-sub">{openCount} open items{overdue > 0 ? ` · ${overdue} overdue` : ''}</div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,flexShrink:0}}>
              <button className="btn btn-sm" onClick={requestNotifications}>Enable Reminders</button>
              <button className="btn btn-sm btn-primary" onClick={() => setModal('dump')}>⊕ Brain Dump</button>
            </div>
          </div>

          {/* Controls */}
          <div className="section-header">
            <div className="section-title">Action Items</div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--text2)',cursor:'pointer'}}>
                <input type="checkbox" checked={showCompleted} onChange={e=>setShowCompleted(e.target.checked)}
                  style={{accentColor:'var(--amber)'}} />
                Show Completed
              </label>
              <button className="btn btn-sm btn-primary" onClick={() => setModal('add')}>+ Add</button>
            </div>
          </div>

          {Object.keys(grouped).length === 0 && (
            <div className="empty">
              <div className="empty-icon">◻</div>
              <div className="empty-text">No action items</div>
              <div className="empty-sub">Start with a brain dump or add items manually</div>
            </div>
          )}

          {/* Grouped items */}
          {Object.entries(grouped).sort(([a],[b]) => {
            if (a === '__general') return 1;
            if (b === '__general') return -1;
            return 0;
          }).map(([key, groupItems]) => (
            <div className="item-group" key={key}>
              <div className="item-group-label" style={{color: getJobColor(key)}}>
                {getJobLabel(key)} ({groupItems.length})
              </div>
              {groupItems.map(item => (
                <ActionItem
                  key={item.id}
                  item={item}
                  jobs={jobs}
                  onToggle={() => toggleItem(item.id)}
                  onDelete={() => deleteItem(item.id)}
                  onEdit={() => { setEditItem(item); setModal('edit'); }}
                />
              ))}
            </div>
          ))}
        </div>
      </div>

      {/* MODALS */}
      {modal === 'dump' && (
        <BrainDumpModal jobs={jobs} apiKey={apiKey} onAdd={addItem} onClose={() => setModal(null)} addToast={addToast} />
      )}
      {(modal === 'add') && (
        <ItemModal jobs={jobs} onSave={data => { addItem(data); setModal(null); addToast('Item added', 'success'); }} onClose={() => setModal(null)} />
      )}
      {modal === 'edit' && editItem && (
        <ItemModal item={editItem} jobs={jobs} onSave={saveEdit} onClose={() => { setModal(null); setEditItem(null); }} />
      )}
      {modal === 'jobs' && (
        <JobModal jobs={jobs} onSave={setJobs} onClose={() => setModal(null)} />
      )}
      {modal === 'settings' && (
        <SettingsModal apiKey={apiKey} reminderTime={reminderTime}
          onSave={({apiKey: k, reminderTime: t}) => { setApiKey(k); setReminderTime(t); addToast('Settings saved', 'success'); }}
          onClose={() => setModal(null)} />
      )}

      <Toasts toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
